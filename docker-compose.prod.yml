version: '3.8'

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod 
    container_name: mern-client-prod
    ports:
      - "80:80" 
    environment:
      VITE_API_BASE_URL: http://server:5000 
    networks:
      - mern-network
    depends_on:
      - server

  server:
    build:
      context: ./server
      dockerfile: Dockerfile 
    container_name: mern-server-prod
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
    env_file:
      - .env.docker
    networks:
      - mern-network
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: mern-mongodb-prod
    volumes:
      - mongo-data:/data/db
    networks:
      - mern-network

networks:
  mern-network:
    driver: bridge

volumes:
  mongo-data: